name: Matrix Demo
on: push
jobs:
    build:
        continue-on-error: true
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
                node-version: [14, 16]
                include:
                    - os: ubuntu-latest
                      node-version: 18
                exclude:
                    - os: macos-latest
                      node-version: 14
        runs-on: ${{ matrix.os }}
        steps:
            - name: Get Code
              uses: actions/checkout@v3
            - name: Install NodeJS
              uses: actions/setup-node@v3
              with:
                  node-version: ${{ matrix.node-version }}
            - name: Install dependencies
              run: npm ci
            - name: Build Project
              run: npm run build